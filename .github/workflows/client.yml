name: Web CI

on:
  pull_request:
    branches: [main, develop]
    paths:
      - '.github/workflows/client.yml'
      - 'client/**'

jobs:
  test:
    name: Test client 🧪
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        id: install-dependencies
        run: npm ci
        working-directory: client

      - name: Run tests
        id: run-tests
        run: npm run test
        working-directory: client

  build:
    name: Build client 🧱
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 10

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'client/package-lock.json'

      - name: Install dependencies
        id: install-dependencies
        run: npm ci
        working-directory: client

      - name: Typecheck
        id: typecheck
        run: npm run typecheck
        working-directory: client

      - name: Lint
        id: lint
        run: npm run lint
        working-directory: client

      - name: Build
        id: build
        run: npm run build
        working-directory: client
