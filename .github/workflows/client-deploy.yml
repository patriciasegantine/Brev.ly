name: Client Deploy - Main to S3

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/client-deploy.yml'

permissions:
  contents: read

concurrency:
  group: client-deploy-main
  cancel-in-progress: false

jobs:
  test:
    name: Test client 🧪
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "client/package-lock.json"

      - name: Install dependencies
        id: install-dependencies
        run: npm ci
        working-directory: client

      - name: Run tests
        id: run-tests
        run: npm run test
        working-directory: client

  build:
    name: Build client 🧱
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    steps:
      - name: Checkout
        id: checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        id: setup-node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "client/package-lock.json"

      - name: Install dependencies
        id: install-dependencies
        run: npm ci
        working-directory: client

      - name: Build
        id: build
        run: npm run build
        working-directory: client

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-dist
          path: client/dist
          retention-days: 1

  deploy:
    name: Deploy to S3 🚀
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15
    environment: production

    steps:
      - name: Download dist artifact
        id: download-dist
        uses: actions/download-artifact@v4
        with:
          name: client-dist
          path: dist

      - name: Validate required AWS settings
        id: validate-aws-settings
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          AWS_S3_BUCKET: ${{ vars.AWS_S3_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          test -n "$AWS_REGION" || (echo "Missing repo variable: AWS_REGION" && exit 1)
          test -n "$AWS_S3_BUCKET" || (echo "Missing repo variable: AWS_S3_BUCKET" && exit 1)
          test -n "$AWS_ACCESS_KEY_ID" || (echo "Missing secret: AWS_ACCESS_KEY_ID" && exit 1)
          test -n "$AWS_SECRET_ACCESS_KEY" || (echo "Missing secret: AWS_SECRET_ACCESS_KEY" && exit 1)

      - name: Configure AWS credentials
        id: aws-credentials
        uses: aws-actions/configure-aws-credentials@v5.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Upload to S3
        id: upload-to-s3
        run: |
          aws s3 sync dist s3://${{ vars.AWS_S3_BUCKET }} --delete
          echo "✅ Deploy completed successfully!"

      - name: Invalidate CloudFront cache
        id: invalidate-cloudfront-cache
        run: |
          aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
          echo "✅ CloudFront invalidation created successfully!"
